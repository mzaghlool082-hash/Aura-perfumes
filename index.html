<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Aura Perfume Store</title>
    <link rel="stylesheet" href="auraStyel.css">
</head>

<body>
    <!-- Header -->
    <header>
        <img src="Aura  photos/531e7cb4-fdb5-47fb-bb6a-7df5543d5660.jpg" alt="Aura Logo" class="logo">
        <h1>Aura Perfumes</h1>
    </header>

    <!-- Products -->
    <main>
        <div class="product">
            <img src="Aura  photos/1256c622-abd0-4840-a4b5-f1cc7906b4d0.jpg" alt="Perfume 1">
            <h3>mint blank</h3>
            <p>EGP 850</p>
            <button class="buy-btn">Buy</button>
        </div>
        <div class="product">
            <img src="Aura  photos/1ecdc930-27c5-4c6e-a977-1cf86443f8af.jpg" alt="Perfume 2">
            <h3>valentino</h3>
            <p>EGP 900</p>
            <button class="buy-btn">Buy</button>
        </div>
        <div class="product">
            <img src="Aura  photos/6103ff7d-fdea-4a66-9fab-a05261e6dcd3.jpg" alt="Perfume 3">
            <h3>azzaro</h3>
            <p>EGP 950</p>
            <button class="buy-btn">Buy</button>
        </div>
        <div class="product">
            <img src="Aura  photos/8cfedb2d-2771-44e6-973f-8ccd39861e61.jpg" alt="Perfume 4">
            <h3>acqua di gio</h3>
            <p>EGP 880</p>
            <button class="buy-btn">Buy</button>
        </div>
        <div class="product">
            <img src="Aura  photos/b8c7a7d4-8dd2-4c3a-8b1d-58eca271249d.jpg" alt="Perfume 5">
            <h3>saheb</h3>
            <p>EGP 1000</p>
            <button class="buy-btn">Buy</button>
        </div>
        <div class="product">
            <img src="Aura  photos/e32ae054-bc83-4ef6-8507-7ea20edc70d0.jpg" alt="Perfume 6">
            <h3>ghazi</h3>
            <p>EGP 920</p>
            <button class="buy-btn">Buy</button>
        </div>
        <div class="product">
            <img src="Aura  photos/e8f239c3-b29c-4f60-ac3d-f21238f1d2d6.jpg" alt="Perfume 7">
            <h3>stronger with you</h3>
            <p>EGP 1100</p>
            <button class="buy-btn">Buy</button>
        </div>
        <div class="product">
            <img src="Aura  photos/ea3de144-43a6-46c0-a256-a8dff1632070.jpg" alt="Perfume 8">
            <h3>dior homme intense</h3>
            <p>EGP 1150</p>
            <button class="buy-btn">Buy</button>
        </div>
        <div class="product">
            <img src="Aura  photos/ed1d2e87-eec7-4ea7-9828-1410b8798764.jpg" alt="Perfume 9">
            <h3>
                stronger with you
                sand wood
            </h3>
            <p>EGP 1200</p>
            <button class="buy-btn">Buy</button>
        </div>
    </main>

    <!-- Cart Section -->
    <aside id="cart">
        <h2>🛒 Cart</h2>
        <ul id="cart-items"></ul>
        <p id="cart-total">Total: EGP 0</p>
        <button id="checkout-btn">Checkout</button>
    </aside>

    <!-- Footer -->
    <footer>
        All rights reserved © Aura Perfumes 2026
    </footer>

    <script src="Aura.js"></script>
</body>

</html>
